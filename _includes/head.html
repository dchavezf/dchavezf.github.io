<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23667eea'><path d='M12 2C6.48 2 2 4.02 2 6.5s4.48 4.5 10 4.5 10-2.02 10-4.5S17.52 2 12 2zm0 18c-5.52 0-10-2.02-10-4.5v-3.5c0 2.48 4.48 4.5 10 4.5s10-2.02 10-4.5v3.5c0 2.48-4.48 4.5-10 4.5zm0-6c-5.52 0-10-2.02-10-4.5V8.5c0 2.48 4.48 4.5 10 4.5s10-2.02 10-4.5v3.5c0 2.48-4.48 4.5-10 4.5z'/></svg>">
  {%- feed_meta -%}
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.esm.min.mjs";
    document.addEventListener("DOMContentLoaded", () => {
      // kramdown renders ```mermaid fences as <pre><code class="language-mermaid">
      document.querySelectorAll("pre > code.language-mermaid").forEach((code) => {
        const pre = code.parentElement;
        const div = document.createElement("div");
        div.className = "mermaid";
        div.textContent = code.textContent;
        pre.replaceWith(div);
      });
      mermaid.initialize({ startOnLoad: true, theme: "neutral" });
    });
  </script>
  <style>
    .mermaid { text-align: center; margin: 1.5em 0; overflow-x: auto; }
    table { display: block; overflow-x: auto; }
  </style>
</head>
