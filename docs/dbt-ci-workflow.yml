name: dbt Core CI

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'models/**'
      - 'seeds/**'
      - 'snapshots/**'
      - 'tests/**'
      - 'dbt_project.yml'
      - 'packages.yml'

jobs:
  dbt-ci:
    name: Run dbt CI checks
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ./ci_profiles
      # Setup environment credentials for staging/CI warehouse connection here
      DBT_SNOWFLAKE_ACCOUNT: ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}
      DBT_SNOWFLAKE_USER: ${{ secrets.DBT_SNOWFLAKE_USER }}
      DBT_SNOWFLAKE_PASSWORD: ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}
      DBT_SNOWFLAKE_ROLE: ${{ secrets.DBT_SNOWFLAKE_ROLE }}
      DBT_SNOWFLAKE_DATABASE: ${{ secrets.DBT_SNOWFLAKE_DATABASE }}
      DBT_SNOWFLAKE_WAREHOUSE: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-numeric-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install dbt-snowflake  # or dbt-bigquery depending on target

      - name: Create CI profiles.yml
        run: |
          mkdir -p ci_profiles
          cat <<EOF > ci_profiles/profiles.yml
          marts_order_cycle:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "{{ env_var('DBT_SNOWFLAKE_ACCOUNT') }}"
                user: "{{ env_var('DBT_SNOWFLAKE_USER') }}"
                password: "{{ env_var('DBT_SNOWFLAKE_PASSWORD') }}"
                role: "{{ env_var('DBT_SNOWFLAKE_ROLE') }}"
                database: "{{ env_var('DBT_SNOWFLAKE_DATABASE') }}"
                warehouse: "{{ env_var('DBT_SNOWFLAKE_WAREHOUSE') }}"
                schema: "ci_pr_${{ github.event.number }}"
                threads: 4
                client_session_keep_alive: False
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: dbt Debug Connection
        run: dbt debug

      - name: Seed data
        run: dbt seed

      - name: Run dbt models (CI schema)
        run: dbt run --exclude tag:prod_only

      - name: Test dbt models
        run: dbt test

      - name: Clean up CI schema on success/failure
        if: always()
        run: |
          # Drop temporary PR schema to keep Snowflake clean and manage FinOps cost
          # Note: Usually executed via an admin-level script or run query step
          echo "Cleaning up schema: ci_pr_${{ github.event.number }}"
