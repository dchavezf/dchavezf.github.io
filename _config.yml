theme: jekyll-theme-chirpy

lang: en
timezone: America/Mexico_City

title: DanielChavez.mx
tagline: Data & Analytics Engineer
description: >-
  Enterprise Data Architect & AI Platform Engineer. Working evidence of
  Fortune 500-scale data migration, modern ELT design, and applied GenAI
  on governed data — business case first, spec second, code third.

avatar: /resume/profile_image.jpg

url: "https://dchavezf.github.io"

github:
  username: dchavezf

social:
  name: Daniel Chávez Flores
  email: dchavezf@gmail.com
  links:
    - https://mx.linkedin.com/in/dchavezf
    - https://github.com/dchavezf

theme_mode:

toc: true

pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

baseurl: ""

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - docs/superpowers
  - docs/plan
  - brand-image

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
